  - id: ENG-2026-0421-002
    version: 2
    status: active
    consolidated: false
    type: terminological
    scope: project:plur
    visibility: public
    statement: >-
      Swarm reference (64-char hex from Bee API) and content hash (keccak256, stored on-chain) are two different values.
      The Swarm ref is the retrieval key; the content hash is the on-chain pointer. Capture the Swarm ref immediately at
      upload — it is not recoverable later. Never assume one can be derived from the other retroactively.
    rationale: Critical distinction that causes silent bugs when deploying to Swarm with on-chain registration
    source: 2026-04-20 demo.plur.ai Swarm deployment
