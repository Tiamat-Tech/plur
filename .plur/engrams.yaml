    statement: >-
      PLUR/Datacore's biggest measurable benchmark advantage is navigation and discoverability (helping models find the
      right tool/module), not pure memory recall. Weaker models (Haiku) benefit most from memory-as-navigation (2.2x on
      inferable scenarios) because they can't explore filesystems well. Stronger models (Opus) benefit most from pure
      memory recall (1.7x on memory-only scenarios) because they can already navigate but can't know past decisions. For
      public benchmarking, report both categories separately — they tell different stories to different audiences.
