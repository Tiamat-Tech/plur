      engine) + exchange (ex-ADE infrastructure). The ADE naming problem triggered the rebrand, but the result was an
      architecture decision: PLUR is the standalone product for shared memory AND data exchange, Datacore uses it via a
      core datacore-plur module. The ADE monorepo (Agent-Data-Exchange: agents-api, sdk, mcp, contracts, discovery) and
      ade CLI become @plur-ai/exchange and plur CLI respectively.
