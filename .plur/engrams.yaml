    status: active
    consolidated: false
    type: procedural
    scope: project:plur
    visibility: private
    statement: >-
      Hermes plugin bugs found during real integration test (2026-03-29): (1) PluginContext has no .logger attribute —
      use Python standard logging.getLogger() instead of ctx.logger. (2) Tool schemas must include a "name" field inside
      the schema dict — Hermes wraps schemas as {"type": "function", "function": schema} and expects schema["name"] to
      exist. (3) Plugin directory structure must be flat (files at plugin root, not in a subpackage) — Hermes loads
      __init__.py from ~/.hermes/plugins/<name>/__init__.py directly. The plur_hermes/ subpackage layout works for pip
      install but not for directory plugins.
