    statement: >-
      Knowledge packs are the first data product type in PLUR's exchange, just as skills are a data product in ADE's
      terms. The exchange infrastructure is product-type agnostic — PLUR should eventually enable more data product
      types (skills, datasets, models, templates). The "publish first" strategy (from 2026-03-02 ADE plan) was: use
      engram packs as the first thing sold to prove the exchange works, then expand. This remains PLUR's go-to-market
      for exchange.
